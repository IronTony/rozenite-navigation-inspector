<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="aurora" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="25%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#d946ef"/>
      <stop offset="75%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="#ffffff" opacity="0.06"/>
    </pattern>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="30%" stop-color="#8b5cf6" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#d946ef" stop-opacity="0.2"/>
      <stop offset="70%" stop-color="#f43f5e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg-grad)"/>
  <rect width="1280" height="320" fill="url(#grid)"/>

  <!-- Aurora glow behind the gradient line -->
  <ellipse cx="640" cy="52" rx="600" ry="40" fill="url(#glow)"/>

  <!-- Gradient line -->
  <rect x="80" y="48" width="1120" height="3" rx="1.5" fill="url(#aurora)"/>

  <!-- Navigation compass icon -->
  <g transform="translate(1140, 160)" opacity="0.15">
    <circle cx="0" cy="0" r="50" fill="none" stroke="#61dafb" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#61dafb" stroke-width="1.5"/>
    <polygon points="0,-30 8,10 0,0 -8,10" fill="#f43f5e"/>
    <polygon points="0,30 8,-10 0,0 -8,-10" fill="#61dafb"/>
    <circle cx="0" cy="0" r="4" fill="#61dafb"/>
    <line x1="0" y1="-55" x2="0" y2="-45" stroke="#61dafb" stroke-width="2"/>
    <line x1="0" y1="45" x2="0" y2="55" stroke="#61dafb" stroke-width="2"/>
    <line x1="-55" y1="0" x2="-45" y2="0" stroke="#61dafb" stroke-width="2"/>
    <line x1="45" y1="0" x2="55" y2="0" stroke="#61dafb" stroke-width="2"/>
  </g>

  <!-- Title -->
  <text x="80" y="155" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', Menlo, Monaco, 'Courier New', monospace" font-size="42" font-weight="700" fill="#f1f5f9" letter-spacing="-0.5">
    rozenite-navigation-inspector
  </text>

  <!-- Subtitle -->
  <text x="80" y="195" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" fill="#8b5cf6" font-style="italic">
    Navigation inspector for Expo Router &amp; React Navigation
  </text>

  <!-- Description -->
  <text x="80" y="230" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#6b7280">
    Visualize routes, inspect state, and navigate your app in real-time
  </text>

  <!-- Bottom accent dots -->
  <circle cx="80" cy="275" r="3" fill="#6366f1" opacity="0.6"/>
  <circle cx="95" cy="275" r="3" fill="#8b5cf6" opacity="0.6"/>
  <circle cx="110" cy="275" r="3" fill="#d946ef" opacity="0.6"/>
  <circle cx="125" cy="275" r="3" fill="#f43f5e" opacity="0.6"/>
  <circle cx="140" cy="275" r="3" fill="#f97316" opacity="0.6"/>
</svg>
